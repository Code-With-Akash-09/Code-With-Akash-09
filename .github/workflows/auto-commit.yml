name: Auto Commits

on:
    schedule:
        - cron: "0 0,2,4,7,9,12,14,16,19,21 * * *"
    workflow_dispatch:

jobs:
    commit:
        permissions:
            contents: write
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate commits
              run: |
                  git config user.name "Code-With-Akash-09"
                  git config user.email "54976989+Code-With-Akash-09@users.noreply.github.com"

                  echo "Auto commit - $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> activity.log
                  git add activity.log
                  if git diff --cached --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "chore: auto commit $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
                    git push
                  fi
